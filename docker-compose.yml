version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      # These variables will be caught by generate-config.sh on startup
      - FIREBASE_API_KEY=AIzaSy...local-key
      - FIREBASE_AUTH_DOMAIN=iopic-local.firebaseapp.com
      - FIREBASE_PROJECT_ID=iopic-local
      - FIREBASE_STORAGE_BUCKET=iopic-local.appspot.com
      - FIREBASE_MESSAGING_SENDER_ID=1234567890
      - FIREBASE_APP_ID=1:1234567890:web:abcdef123456
      - USE_EMULATOR=true
      - APP_CHECK_SITE_KEY=your-recaptcha-site-key
      - APP_CHECK_DEBUG_TOKEN=12345678-1234-1234-1234-123456789012
