apiVersion: v1
kind: Secret
metadata:
  name: frontend-secrets
type: Opaque
stringData:
  FIREBASE_API_KEY: "AIzaSy...prod-key"
  FIREBASE_APP_ID: "1:1234567890:web:abcdef123456"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
data:
  # These variables are read by your container's generate-config.sh script
  FIREBASE_AUTH_DOMAIN: "iopic-prod.firebaseapp.com"
  FIREBASE_PROJECT_ID: "iopic-prod"
  FIREBASE_STORAGE_BUCKET: "iopic-prod.appspot.com"
  FIREBASE_MESSAGING_SENDER_ID: "1234567890"
  USE_EMULATOR: "false"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iopic-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iopic-frontend
  template:
    metadata:
      labels:
        app: iopic-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/iopic-frontend:latest
          ports:
            - containerPort: 80
          # Inject the ConfigMap as environment variables
          envFrom:
            - configMapRef:
                name: frontend-config
            - secretRef:
                name: frontend-secrets
