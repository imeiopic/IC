apiVersion: v1
kind: Secret
metadata:
  name: frontend-secrets
type: Opaque
stringData:
  FIREBASE_API_KEY: "${FIREBASE_API_KEY}" # To be replaced by CI/CD
  FIREBASE_APP_ID: "${FIREBASE_APP_ID}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
data:
  # These variables are read by your container's generate-config.sh script
  FIREBASE_AUTH_DOMAIN: "iopic-prod.firebaseapp.com"
  FIREBASE_PROJECT_ID: "iopic-prod"
  FIREBASE_STORAGE_BUCKET: "iopic-prod.appspot.com"
  FIREBASE_MESSAGING_SENDER_ID: "1234567890"
  USE_EMULATOR: "false"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iopic-frontend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: iopic-frontend
  template:
    metadata:
      labels:
        app: iopic-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: frontend
          image: ghcr.io/your-org/iopic-frontend:${IMAGE_TAG}
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
          envFrom:
            - configMapRef:
                name: frontend-config
            - secretRef:
                name: frontend-secrets
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iopic-frontend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iopic-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
