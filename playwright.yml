name: Playwright E2E Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests with Coverage (Enforce Thresholds)
        run: npm run test:coverage -- --coverage.reporter=json-summary --coverage.reporter=text --coverage.lines=80 --coverage.functions=80 --coverage.branches=80

      - name: Report Coverage to PR Comment
        uses: davelosert/vitest-coverage-report-action@v2
        if: always() && github.event_name == 'pull_request'

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          # Provide mock environment variables to satisfy Vite's Zod schema validation during local boot
          VITE_FIREBASE_API_KEY: "mock-key"
          VITE_FIREBASE_AUTH_DOMAIN: "mock.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "mock-project"
          VITE_FIREBASE_STORAGE_BUCKET: "mock.appspot.com"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          VITE_FIREBASE_APP_ID: "1:1234567890:web:abcdef123456"
          VITE_FIREBASE_MEASUREMENT_ID: "G-MOCK123"
          VITE_FIREBACK_PORT: "5000"
          VITE_FIREBACK_HOST: "localhost"
          VITE_SSL_STRATEGY: "none"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
