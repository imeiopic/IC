<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web QR Code Scanner</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #f9f9f9; }
    #video { width: 320px; height: 240px; border: 1px solid #ccc; margin: 1rem auto; display: block; }
    #result { margin-top: 1rem; font-size: 1.2rem; color: #333; }
  </style>
</head>
<body>
  <h1>QR Code Scanner</h1>
  <video id="video" autoplay></video>
  <div id="result">Scan a QR code...</div>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const video = document.getElementById('video');
    const result = document.getElementById('result');
    const canvas = document.createElement('canvas');
    let scanning = false;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        video.srcObject = stream;
        video.setAttribute('playsinline', true);
        video.play();
        scanning = true;
        requestAnimationFrame(tick);
      });

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          result.textContent = 'QR Code: ' + code.data;
          scanning = false;
          video.srcObject.getTracks().forEach(track => track.stop());
          return;
        }
      }
      if (scanning) requestAnimationFrame(tick);
    }
  </script>
</body>
</html>
